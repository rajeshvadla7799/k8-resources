apiVersion: v1
kind: Pod

metadata:
  name: annotations
  namespace: roboshop
  labels:
    project: roboshop
    component: frontend
    environment: dev

  annotations:
    imageregistry: "https://www.docker.com/"
    jenkinsurl: "https://www.jenkins.io/"
spec:
  containers:
    - name: nginx
      image: nginx:1.14.2