apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  selector:
   # labels are used as selector to identify the pods which are part of this service
    project: roboshop
    component: frontend
    environment: dev
    port:
      - protocol: TCP
        port: 80 # service port which is exposed by the service
        targetPort: 80 # container port which is exposed by the pod